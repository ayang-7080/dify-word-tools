identity:
  name: regex-highlight
  author: ayang
  label:
    en_US: 文字高亮标蓝(正则)
    zh_Hans: 文字高亮标蓝(正则)
    pt_BR: 文字高亮标蓝(正则)
description:
  human:
    en_US: 对word中的部分文字进行高亮处理,如PMID、DOI号、图表编号
    zh_Hans: 对word中的部分文字进行高亮处理,如PMID、DOI号、图表编号
    pt_BR: 对word中的部分文字进行高亮处理,如PMID、DOI号、图表编号
  llm: office-docx
parameters:
  - name: file
    type: file
    required: true
    label:
      en_US: Word file
      zh_Hans: word文件
      pt_BR: word文件
    human_description:
      en_US: word文件
      zh_Hans: word文件
      pt_BR: word文件
    llm_description: office-word
    form: llm

  - name: content_type
    type: select
    required: true
    label:
      en_US: 高亮内容类型
      zh_Hans: 高亮内容类型
      pt_BR: 高亮内容类型
    human_description:
      en_US: 高亮内容类型
      zh_Hans: 高亮内容类型
      pt_BR: 高亮内容类型
    default: pmid_and_image
    options:
      - label:
          zh_Hans: 文中引用的pmid、doi号和图表号
          en_US: pmid_and_image
        value: pmid_and_image
      - label:
          zh_Hans: 文中引用的pmid、doi号
          en_US: pmid
        value: pmid
      - label:
          zh_Hans: 文中引用的图表号
          en_US: image_number
        value: image_number
      - label:
          zh_Hans: 自定义正则
          en_US: 自定义正则
        value: customize_regex
    form: llm

  - name: in_regex
    type: string
    required: false
    default: ""
    label:
      en_US: 自定义正则表达式
      zh_Hans: 自定义正则表达式
      pt_BR: 自定义正则表达式
    human_description:
      en_US: 自定义正则表达式
      zh_Hans: 自定义正则表达式
      pt_BR: 自定义正则表达式
    llm_description: in_regex
    form: llm

  - name: is_italic
    type: boolean
    required: false
    default: false
    label:
      en_US: is_italic
      zh_Hans: 设置为斜体
      pt_BR: is_italic
    human_description:
      en_US: "是否设置为斜体"
      zh_Hans: "是否设置为斜体"
      pt_BR: "是否设置为斜体"
    llm_description: "is_italic"
    form: form

  - name: is_bold
    type: boolean
    required: false
    default: false
    label:
      en_US: is_bold
      zh_Hans: 设置为加粗
      pt_BR: is_bold
    human_description:
      en_US: "是否设置为加粗"
      zh_Hans: "是否设置为加粗"
      pt_BR: "是否设置为加粗"
    llm_description: "is_bold"
    form: form
extra:
  python:
    source: tools/expand/regex-highlight.py
